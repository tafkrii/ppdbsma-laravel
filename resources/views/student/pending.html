<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Status Seleksi — Dalam Proses</title>
  <link rel="stylesheet" href="css/seleksi.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-top">
      <img src="img/logo.png" alt="Logo" class="logo" />
      <span class="app-name">PPDB Online</span>
    </div>
    <nav class="nav">
      <a href="/dashboard" class="nav-item">Dashboard</a>
      <a href="#" class="nav-item active">Status Seleksi</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar">S</div>
        <div>
          <p class="user-name">Nama Siswa</p>
          <p class="user-role">Calon Pendaftar</p>
        </div>
      </div>
      <a href="/login" class="btn-logout">Keluar</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Status Seleksi</h1>
    </div>

    <div class="content">
      <div class="status-card pending">
        <div class="status-icon">⏳</div>
        <h2 class="status-judul">DALAM PROSES SELEKSI</h2>
        <p class="status-text">
          Data Anda sedang dalam tahap peninjauan oleh panitia. Mohon menunggu
          pengumuman hasil seleksi yang akan diinformasikan kemudian.
        </p>
      </div>
    </div>
  </main>

</body>
</html>
